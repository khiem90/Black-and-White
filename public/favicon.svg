<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" aria-label="Black &amp; White">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcc88a"/>
      <stop offset="40%" stop-color="#c4a265"/>
      <stop offset="100%" stop-color="#8a7030"/>
    </linearGradient>
    <linearGradient id="black" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#333950"/>
      <stop offset="60%" stop-color="#1c2035"/>
      <stop offset="100%" stop-color="#151828"/>
    </linearGradient>
    <linearGradient id="white" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#faf5ea"/>
      <stop offset="60%" stop-color="#e8ddc8"/>
      <stop offset="100%" stop-color="#d8ccb0"/>
    </linearGradient>
    <clipPath id="innerHex">
      <polygon points="50,10 90,33 90,82 50,105 10,82 10,33"/>
    </clipPath>
  </defs>
  <!-- Gold hex frame -->
  <polygon points="50,0 100,28.75 100,86.25 50,115 0,86.25 0,28.75" fill="url(#gold)"/>
  <!-- Inner face: left half black, right half white -->
  <g clip-path="url(#innerHex)">
    <rect x="0" y="0" width="50" height="115" fill="url(#black)"/>
    <rect x="50" y="0" width="50" height="115" fill="url(#white)"/>
  </g>
</svg>
